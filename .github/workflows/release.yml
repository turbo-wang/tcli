# Tags v* build binaries and attach:
#   tcli-${TAG}-x86_64-unknown-linux-gnu.tar.gz
#   tcli-${TAG}-aarch64-apple-darwin.tar.gz
# Install: ./scripts/install.sh --release  (default repo turbo-wang/tcli; override TCLI_RELEASE_REPO for forks)
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: tcli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          NAME="tcli-${TAG}-${{ matrix.asset }}"
          mkdir -p pack
          cp "tcli/target/${{ matrix.target }}/release/tcli" "pack/tcli"
          chmod +x pack/tcli
          tar -czf "${NAME}.tar.gz" -C pack tcli

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: tcli-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
