# Push tag v* → build per platform → one GitHub Release with all assets:
#   tcli-${TAG}-x86_64-unknown-linux-gnu.tar.gz
#   tcli-${TAG}-aarch64-apple-darwin.tar.gz
#   SHA256SUMS
#
# Install prebuilt: TCLI_RELEASE_REPO=owner/repo ./scripts/install.sh --release
# (see root install.sh; default repo in docs may differ — set TCLI_RELEASE_REPO for your fork)
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        working-directory: tcli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          NAME="tcli-${TAG}-${{ matrix.asset }}"
          mkdir -p pack
          cp "tcli/target/${{ matrix.target }}/release/tcli" "pack/tcli"
          chmod +x pack/tcli
          tar -czf "${NAME}.tar.gz" -C pack tcli
          ls -la "${NAME}.tar.gz"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tcli-${{ matrix.asset }}
          path: tcli-${{ github.ref_name }}-${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all platform archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: SHA256 checksums
        run: |
          set -euo pipefail
          ls -la dist/
          (cd dist && shasum -a 256 *.tar.gz > SHA256SUMS)
          cat dist/SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
